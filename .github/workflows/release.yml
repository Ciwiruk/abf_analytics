name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for manual build (e.g., v1.0.0)'
        required: false
        default: 'manual-build'

# Cancel outdated runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 (native)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: abf_analytics.exe
            asset_name: abf_analytics-windows-x64.exe
            cross: false
          # Windows ARM64 (cross-compile from x64)
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: abf_analytics.exe
            asset_name: abf_analytics-windows-arm64.exe
            cross: false
          # Linux x64 (native)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: abf_analytics
            asset_name: abf_analytics-linux-x64
            cross: false
          # Linux ARM64 (cross-compile from x64 on ubuntu-22.04 for stable arm64 repos)
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact_name: abf_analytics
            asset_name: abf_analytics-linux-arm64
            cross: true
          # macOS x64 (native)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: abf_analytics
            asset_name: abf_analytics-macos-x64.zip
            cross: false
          # macOS ARM64 (native on Apple Silicon runner)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: abf_analytics
            asset_name: abf_analytics-macos-arm64.zip
            cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Install dependencies (Linux x64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libvulkan-dev \
            libwayland-dev \
            pkg-config

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.cross && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev:arm64 \
            libxcb-render0-dev:arm64 \
            libxcb-shape0-dev:arm64 \
            libxcb-xfixes0-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libssl-dev:arm64 \
            libvulkan-dev:arm64 \
            libwayland-dev:arm64

      - name: Set up cross-compilation environment (Linux ARM64)
        if: matrix.cross && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
          echo '' >> .cargo/config.toml
          echo '[env]' >> .cargo/config.toml
          echo 'PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"' >> .cargo/config.toml
          echo 'PKG_CONFIG_ALLOW_CROSS = "1"' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux x64)
        if: matrix.os == 'ubuntu-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Strip binary (Linux ARM64)
        if: matrix.cross && matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Rename binary for upload (Windows/Linux)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
             "target/${{ matrix.target }}/release/${{ matrix.asset_name }}"

      - name: Create macOS zip
        if: runner.os == 'macOS'
        run: |
          cd "target/${{ matrix.target }}/release"
          zip "${{ matrix.asset_name }}" "${{ matrix.artifact_name }}"
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
          retention-days: 7

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir"* "release/$name"
          done
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "name=Build ${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "draft=true" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: release/*
          draft: ${{ steps.version.outputs.draft }}
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
